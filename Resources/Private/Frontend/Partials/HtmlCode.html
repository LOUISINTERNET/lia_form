<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:formvh="http://typo3.org/ns/TYPO3/CMS/Form/ViewHelpers"
      data-namespace-typo3-fluid="true"
>
  <formvh:renderRenderable renderable="{element}">
    <div class="c-form__htmlcode {element.identifier}">
      <f:if condition="{element.properties.text}">
        <f:if condition="{element.properties.font}">
          <f:then>
            <{element.properties.font} class="{element.properties.align} {element.properties.class}">
              {formvh:translateElementProperty(element: element, property: 'text') -> f:format.nl2br()}
            </{element.properties.font}>
          </f:then>
          <f:else>
            <p class="{element.properties.align} {element.properties.class}">
              {formvh:translateElementProperty(element: element, property: 'text') -> f:format.nl2br()}
            </p>
          </f:else>
        </f:if>
      </f:if>
    </div>
  </formvh:renderRenderable>
</html>
