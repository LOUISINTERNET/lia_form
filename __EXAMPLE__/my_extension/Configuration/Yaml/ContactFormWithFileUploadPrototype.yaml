                  sd:
                    numbersOfColumnsToUse: "24"
                  md:
                    numbersOfColumnsToUse: "24"
                  lg:
                    numbersOfColumnsToUse: "24"
              saveToFileMount: typo3temp/formuploads/
              allowedMimeTypes:
